# seiton configuration schema definition
# This file documents the config schema constraints. The authoritative
# runtime schema is the zod definition in src/config/schema.ts.
# Validation is performed by zod at load time, not by this YAML file.

type: object
additionalProperties: false
required:
  - version

properties:
  version:
    type: integer
    const: 1

  core:
    type: object
    additionalProperties: false
    properties:
      output_format:
        type: string
        enum: [text, json]
        default: text
      color:
        type: string
        enum: [auto, always, never]
        default: auto
      verbose:
        type: integer
        minimum: 0
        maximum: 2
        default: 0
      quiet:
        type: boolean
        default: false

  paths:
    type: object
    additionalProperties: false
    properties:
      pending_queue:
        type: [string, "null"]
        default: null
      bw_binary:
        type: [string, "null"]
        default: null

  audit:
    type: object
    additionalProperties: false
    properties:
      skip_categories:
        type: array
        items:
          type: string
        default: []
      limit_per_category:
        type: [integer, "null"]
        minimum: 1
        default: null
      save_pending_on_sigint:
        type: boolean
        default: true

  strength:
    type: object
    additionalProperties: false
    properties:
      min_length:
        type: integer
        minimum: 1
        default: 12
      require_digit:
        type: boolean
        default: true
      require_symbol:
        type: boolean
        default: true
      min_character_classes:
        type: integer
        minimum: 1
        maximum: 4
        default: 2
      zxcvbn_min_score:
        type: integer
        minimum: 0
        maximum: 4
        default: 2
      extra_common_passwords:
        type: array
        items:
          type: string
        default: []

  dedup:
    type: object
    additionalProperties: false
    properties:
      name_similarity_threshold:
        type: integer
        minimum: 0
        default: 3
      treat_www_as_same_domain:
        type: boolean
        default: true
      case_insensitive_usernames:
        type: boolean
        default: true
      compare_only_primary_uri:
        type: boolean
        default: true

  folders:
    type: object
    additionalProperties: false
    properties:
      preserve_existing:
        type: boolean
        default: true
      enabled_categories:
        type: array
        items:
          type: string
        default:
          - "Banking & Finance"
          - Email
          - Social
          - Shopping
          - Development
          - Entertainment
          - Utilities
          - "Government & ID"
          - Health
          - Other
      custom_rules:
        type: array
        items:
          type: object
          required: [folder, keywords]
          additionalProperties: false
          properties:
            folder:
              type: string
              minLength: 1
            keywords:
              type: array
              items:
                type: string
                minLength: 1
              minItems: 1
        default: []

  ui:
    type: object
    additionalProperties: false
    properties:
      mask_character:
        type: string
        minLength: 1
        maxLength: 4
        default: "\u2022"
      show_revision_date:
        type: boolean
        default: true
      color_scheme:
        type: string
        enum: [auto, light, dark]
        default: auto
      prompt_style:
        type: string
        enum: [clack, plain]
        default: clack
